name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: Package VSIX
        run: npx @vscode/vsce package --allow-missing-repository -o sound-alerts.vsix
      - uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: sound-alerts.vsix
      - name: Attach VSIX to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: sound-alerts.vsix
      - name: Publish to Open VSX (Cursor / VSCodium)
        if: startsWith(github.ref, 'refs/tags/') && env.OVSX_TOKEN != ''
        env:
          OVSX_TOKEN: ${{ secrets.OVSX_TOKEN }}
        run: npx ovsx publish sound-alerts.vsix -p "$OVSX_TOKEN"
