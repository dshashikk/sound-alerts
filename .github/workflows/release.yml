name: Build VSIX

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npx @vscode/vsce package --allow-missing-repository -o cursor-sound-alerts.vsix
      - uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: cursor-sound-alerts.vsix
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: cursor-sound-alerts.vsix
